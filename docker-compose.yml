services:
  app:
    image: tacombel/eve-frontier-blueprints:latest
    container_name: eve-frontier-blueprints
    platform: linux/arm64
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:/data/dev.db"
      JWT_SECRET: "${JWT_SECRET}"
    volumes:
      - eve_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  eve_data:
