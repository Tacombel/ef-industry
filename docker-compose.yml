services:
  app:
    build: .
    container_name: ef-industry
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "file:/data/dev.db"
      JWT_SECRET: "${JWT_SECRET}"
    volumes:
      - eve_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/blueprints"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  eve_data:
